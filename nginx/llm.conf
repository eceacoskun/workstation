# /etc/nginx/conf.d/llm.conf

upstream llm_gateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP -> HTTPS yonlendirme
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name llm.example.com;          # <- kendi domainin

    ssl_certificate     /etc/nginx/ssl/llm.crt;
    ssl_certificate_key /etc/nginx/ssl/llm.key;

    # ── Streaming (SSE) icin kritik ayarlar ──
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;                   # token'lari bekletmeden ilet
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    client_max_body_size 32m;              # buyuk embedding batch'leri icin

    location / {
        proxy_pass http://llm_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
